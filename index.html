<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles.css">

    <title>geschen://</title>
</head>
<body>
    <div id="fill">
        <div id="top">
            <div id="back" class="navarrow">🡨</div>
            <div id="forward" class="navarrow">🡪</div>
            <div id="up" class="navarrow">🡩</div>
            <div style="width: 10px;"></div>
            <div id="navbar">
                <div id="navroot">🏠︎</div>
                <div class="navlocarrow">﹥</div>
                <div class="navlocation">geschen</div>
            </div>
        </div>
        <div id="content">
            <div id="navigation">
            </div>
            <div class="bar" id="barl"></div>
            <div id="items"></div>
            <div class="bar" id="barr"></div>
            <div id="description">
                <div id="descprevcontainer">
                    <div id="descprev"></div>
                </div>
                <div id="desctextcontainer">
                    <span id="desctitle"><b>Description</b></span>
                    <span id="desctext"></span>
                </div>
            </div>
        </div>
        <div id="statusbar">
            <div style="width: 15px;"></div>
            <span id="totalcount" class="statuscontent">items  ┃</span>
            <span id="selectedcount" class="statuscontent"></span>
        </div>
    </div>
    <div id="preview" style="display: none;">
        <div id="pvbar">
            <span id="pvname">file file </span>
            <div id="pvxbutton"><span>X</span></div>
        </div>
        <div id="pvcontent">
        </div>
    </div>
    <script src="bar.js"></script>
    <script src="window.js"></script>
    <script src="files.js"></script>
</body>
</html>
